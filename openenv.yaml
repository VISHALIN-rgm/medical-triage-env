name: medical-triage-env
version: 2.0.0
description: Hospital triage environment for AI agent evaluation with 3 difficulty levels

tasks:
  - id: easy
    name: Identify Critical Patients
    description: Agent must identify which patient needs immediate care from vital signs
    max_steps: 10
    grader: easy_grader
    expected_actions: ["escalate", "discharge"]

  - id: medium
    name: Prioritize Patient Queue
    description: Agent must correctly prioritize 5 patients with conflicting symptoms
    max_steps: 20
    grader: medium_grader
    expected_actions: ["treat", "escalate", "discharge"]

  - id: hard
    name: Manage Deteriorating Patients
    description: Agent must adaptively treat patients whose condition worsens over time
    max_steps: 25
    grader: hard_grader
    expected_actions: ["treat", "escalate"]

observation_space:
  patients: "List[Patient] with vitals (HR, BP, O2, Temp), symptoms, status"
  current_step: int
  max_steps: int
  task_id: str
  done: bool
  available_tests: "List[str]"
  available_treatments: "List[str]"

# FIXED: action types now match MedicalAction model in models.py and inference.py
action_space:
  type: "Literal['discharge', 'treat', 'escalate', 'investigate']"
  patient_id: str
  notes: "Optional[str]"

reward_structure:
  per_step:
    correct_action: +10
    wrong_action: -5
    investigate_appropriate: +5
    investigate_inappropriate: -2
    under_treatment: -8
    over_escalation: -5
  episode:
    max_reward: "10 per patient"

endpoints:
  reset: "POST /reset  — { task_id: str } -> observation"
  step:  "POST /step   — { action: {type, patient_id, notes}, session_id } -> {observation, reward, done}"
  health: "GET /health  — -> { status, accuracy, version }"
  stats: "GET /stats   — -> agent performance stats"
  predict: "POST /predict — single patient prediction"

deployment:
  hf_space: true
  docker: true
  base_image: python:3.10-slim
  port: 8000
  entrypoint: "python inference.py"