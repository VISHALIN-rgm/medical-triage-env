name: medical-triage-env
version: 2.0.0
description: Emergency Department Triage Environment

environment:
  class: MedicalTriageEnvironment
  module: server.medical_triage_env_environment

endpoints:
  reset:
    path: /reset
    method: POST
  step:
    path: /step
    method: POST

actions:
  - DISCHARGE
  - TREAT
  - ESCALATE
  - INVESTIGATE

tasks:
  easy:
    max_steps: 3
  medium:
    max_steps: 5
  hard:
    max_steps: 8

deployment:
  docker: true
  port: 8000
  command: python -c "from server.app import app; import uvicorn; uvicorn.run(app, host='0.0.0.0', port=8000)"